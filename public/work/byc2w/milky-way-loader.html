<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milky Way Simulation - Loading</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050810;
            --accent-cyan: #4facfe;
            --accent-blue: #00f2fe;
        }
        
        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-color);
            color: #e2e8f0;
            font-family: 'Rajdhani', sans-serif;
            user-select: none;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .mono-text {
            font-family: 'Space Mono', monospace;
        }

        .glow-text {
            text-shadow: 0 0 15px rgba(79, 172, 254, 0.6), 0 0 30px rgba(0, 242, 254, 0.4);
        }

        .percentage-display {
            font-size: 5rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            background: linear-gradient(to right, #ffffff, #87ceeb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(135, 206, 235, 0.5));
            display: flex;
            align-items: baseline;
        }

        .percentage-sign {
            font-size: 2.5rem;
            margin-left: 0.5rem;
            color: #87ceeb;
            -webkit-text-fill-color: initial;
        }

        .status-container {
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .status-text {
            font-size: 0.85rem;
            letter-spacing: 0.3em;
            color: #8fa3c4;
            text-transform: uppercase;
        }

        /* Techy decorations */
        .corner-decor {
            position: absolute;
            width: 150px;
            height: 150px;
            border: 1px solid rgba(79, 172, 254, 0.2);
            z-index: 5;
        }
        .top-left { top: 30px; left: 30px; border-right: none; border-bottom: none; }
        .top-right { top: 30px; right: 30px; border-left: none; border-bottom: none; }
        .bottom-left { bottom: 30px; left: 30px; border-right: none; border-top: none; }
        .bottom-right { bottom: 30px; right: 30px; border-left: none; border-top: none; }

        .terminal-logs {
            position: absolute;
            bottom: 40px;
            left: 40px;
            font-size: 0.7rem;
            color: rgba(143, 163, 196, 0.6);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        /* Pulse animation for the central ring */
        .center-ring {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            border: 1px dashed rgba(79, 172, 254, 0.3);
            animation: spin 20s linear infinite;
        }

        .center-ring-inner {
            position: absolute;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 1px solid rgba(0, 242, 254, 0.1);
            animation: spin-reverse 15s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }
        
        .fade-out {
            opacity: 0;
            transition: opacity 1.5s ease-out;
        }

        .progress-bar-container {
            width: 240px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            border-radius: 2px;
        }

        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, transparent, #4facfe, #ffffff);
            box-shadow: 0 0 10px #00f2fe;
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>

    <!-- Canvas Background for Particle Galaxy -->
    <div id="canvas-container">
        <canvas id="galaxyCanvas"></canvas>
    </div>

    <!-- Decorative UI Elements matching the screenshot -->
    <div class="corner-decor top-left"></div>
    <div class="corner-decor top-right"></div>
    <div class="corner-decor bottom-left"></div>
    <div class="corner-decor bottom-right"></div>

    <div class="terminal-logs mono-text" id="terminalLogs">
        <div>> INITIALIZING MILKY WAY HEURISTICS</div>
    </div>

    <!-- Main Central UI -->
    <div class="ui-layer" id="mainUI">
        <div class="center-ring"></div>
        <div class="center-ring-inner"></div>
        
        <div class="percentage-display glow-text mono-text">
            <span id="percentage">0</span><span class="percentage-sign">%</span>
        </div>
        
        <div class="status-container">
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="status-text mono-text glow-text" id="statusText">GENERATING PROCEDURAL GALAXY</div>
        </div>
    </div>

    <script>
        // --- Canvas Galaxy Setup ---
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height, centerX, centerY;
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        // Stellar classification colors based on the UI screenshot (O,B,A,F,G,K,M)
        const starColors = [
            '#9DB4FF', // O Class - Light Blue
            '#B4C7FF', // B Class - Pale Blue
            '#FFFFFF', // A Class - White
            '#FFF4E8', // F Class - Yellow/White
            '#FFD2A1', // G Class - Yellow
            '#FFB56C', // K Class - Orange
            '#FF9360'  // M Class - Red
        ];

        class Particle {
            constructor() {
                this.reset();
                // Randomize initial angle and distance to form a spiral initially
                this.angle = Math.random() * Math.PI * 2;
                this.distance = Math.random() * (Math.min(width, height) / 1.5);
                this.baseDistance = this.distance;
            }

            reset() {
                this.angle = Math.random() * Math.PI * 2;
                this.distance = (Math.random() * (Math.min(width, height) / 1.5)) + 100;
                this.baseDistance = this.distance;
                this.speed = (Math.random() * 0.005) + 0.001;
                this.size = Math.random() * 2 + 0.5;
                this.color = starColors[Math.floor(Math.random() * starColors.length)];
                
                // Spiral arm offset
                this.spiralOffset = (Math.random() - 0.5) * 50;
            }

            update(progressMultiplier, isCompleting) {
                // As progress increases, stars spin faster and pull slightly inward
                let currentSpeed = this.speed * (1 + progressMultiplier * 4);
                this.angle += currentSpeed;

                if (isCompleting) {
                    // Warp drive expansion effect at the end
                    this.distance += (this.distance * 0.05) + 2;
                    this.size *= 1.02;
                } else {
                    // Subtle breathing/pulling inward as it loads
                    this.distance = this.baseDistance - (this.baseDistance * 0.3 * progressMultiplier);
                }

                // Calculate position with a spiral effect
                let spiralFactor = this.distance * 0.05;
                this.x = centerX + Math.cos(this.angle + spiralFactor) * this.distance;
                this.y = centerY + Math.sin(this.angle + spiralFactor) * this.distance;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = this.size * 3;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0; // reset for performance
            }
        }

        const particles = Array.from({ length: 400 }, () => new Particle());

        // --- Loading Logic & UI Updates ---
        let loadProgress = 0;
        let isCompleting = false;
        const percentageEl = document.getElementById('percentage');
        const progressBarEl = document.getElementById('progressBar');
        const statusTextEl = document.getElementById('statusText');
        const terminalLogsEl = document.getElementById('terminalLogs');

        const statusMessages = [
            "GENERATING PROCEDURAL GALAXY",
            "CALCULATING STELLAR DISTRIBUTIONS",
            "MAPPING HABITABLE ZONES",
            "SYNTHESIZING O-M CLASS STARS",
            "ESTABLISHING GALACTIC CORE",
            "FINALIZING SIMULATION ENVIRONMENT"
        ];

        let logs = ["> INITIALIZING MILKY WAY HEURISTICS"];

        function addTerminalLog() {
            if (isCompleting) return;
            const logTexts = [
                `> SCANNED SYSTEM [${Math.floor(Math.random() * 9000) + 1000}]... OK`,
                "> ALLOCATING MEMORY FOR CRUX CLUSTER",
                `> FOUND ${Math.floor(Math.random() * 5)} POTENTIAL HABITABLE WORLDS`,
                "> RESOLVING ORION SPUR ANOMALIES",
                "> IGNITING MAIN SEQUENCE STARS"
            ];
            logs.push(logTexts[Math.floor(Math.random() * logTexts.length)]);
            if (logs.length > 5) logs.shift();
            
            terminalLogsEl.innerHTML = logs.map(l => `<div>${l}</div>`).join('');
            
            setTimeout(addTerminalLog, Math.random() * 800 + 400);
        }
        addTerminalLog();

        // Main Animation Loop
        function animate() {
            // Create the trailing effect by not fully clearing the canvas
            ctx.fillStyle = 'rgba(5, 8, 16, 0.15)';
            ctx.fillRect(0, 0, width, height);

            let progressMultiplier = loadProgress / 100;

            particles.forEach(p => {
                p.update(progressMultiplier, isCompleting);
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        const timeline = {
            totalMs: 5000,
            startDelayMs: 200,
            fillDurationMs: 3400,
            readyHoldMs: 600,
            fadeDurationMs: 700
        };

        let parentNotified = false;
        let timelineStartedAt = performance.now();

        function notifyParentReady() {
            if (parentNotified) return;
            parentNotified = true;
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({ type: 'milky-way-loader-ready' }, '*');
            }
        }

        function updateLoadingUi(progressValue) {
            loadProgress = Math.max(0, Math.min(100, progressValue));
            percentageEl.innerText = String(Math.floor(loadProgress));
            progressBarEl.style.width = `${loadProgress}%`;

            let statusIndex = Math.floor((loadProgress / 100) * statusMessages.length);
            if (statusIndex >= statusMessages.length) statusIndex = statusMessages.length - 1;
            statusTextEl.innerText = statusMessages[statusIndex];
        }

        function runDeterministicLoading() {
            const now = performance.now();
            const elapsed = now - timelineStartedAt;
            const effectiveElapsed = Math.max(0, elapsed - timeline.startDelayMs);
            const progressValue = (effectiveElapsed / timeline.fillDurationMs) * 100;

            if (!isCompleting) {
                updateLoadingUi(progressValue);
            }

            if (effectiveElapsed >= timeline.fillDurationMs) {
                completeLoading();
                return;
            }

            requestAnimationFrame(runDeterministicLoading);
        }

        function completeLoading() {
            if (isCompleting) return;
            isCompleting = true;
            percentageEl.innerText = "100";
            progressBarEl.style.width = "100%";
            statusTextEl.innerText = "SIMULATION READY";
            statusTextEl.style.color = "#00f2fe";
            logs.push("> LAUNCHING EXPLORER UI...");
            terminalLogsEl.innerHTML = logs.map(l => `<div>${l}</div>`).join('');

            // Hold at 100%, then run full fade before signaling parent navigation.
            setTimeout(() => {
                document.getElementById('mainUI').classList.add('fade-out');
                document.body.style.transition = `opacity ${timeline.fadeDurationMs}ms ease`;
                document.body.style.opacity = 0;
                setTimeout(() => {
                    notifyParentReady();
                }, timeline.fadeDurationMs + 40);
            }, timeline.readyHoldMs);
        }

        // Start everything
        animate();
        runDeterministicLoading();

    </script>
</body>
</html>
